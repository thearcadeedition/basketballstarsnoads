<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />    
    <link rel="stylesheet" href="assets/css/app.css" type="text/css" />    
    <title>Basketball Stars - Ad Free</title>
    
    <style>
        /* Forces the game to fill the screen properly */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div id="content"></div>
    <div id="loader">Loading ...</div>

    <script type="text/javascript" src="assets/lib/nape.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-cachebuster.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-super-storage.min.js"></script>
    <script type="text/javascript" src="assets/lib/dragonBones.min.js"></script>

    <script type="text/javascript">
        // --- THE AD-KILLER BYPASS ---
        var useEvents = (typeof(Event) === 'function');

        var myDispatchEvent = function (name){
            var event;
            if (useEvents){
                event =  new Event(name);
            }else{
                event = document.createEvent('Event');
                event.initEvent(name, true, true);
            }
            document.getElementById("content").dispatchEvent(event);
        }

        // We fake the SDK being ready immediately so the game doesn't wait for ads
        window["GD_OPTIONS"] = {
            "gameId": "516d6908fbc848bdb89e65a58a43a7dc",
            "onEvent": function(event) {
                // Logic removed - we don't want the real SDK to trigger anything
            },
        };

        // This tells the game engine: "The ad is over, start the game now!"
        window.onload = function() {
            setTimeout(function() {
                console.log("Bypassing Ads...");
                myDispatchEvent('SDK_READY');
                myDispatchEvent('SDK_GAME_START');
            }, 500);
        };
        
        // Block the real SDK from ever loading
        window.gdsdk = {
            showAd: function() { return Promise.resolve(); },
            preloadAd: function() { return Promise.resolve(); }
        };
    </script>

    <script type="text/javascript" src="basketball_stars.min.js"></script>
</body>

</html>
