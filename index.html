<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />    
    
    <link rel="stylesheet" href="assets/css/app.css" type="text/css" />    
    
    <title>Basketball Stars - Clean Version</title>
    
    <style>
        /* Force the game to be full-screen and hide scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain; /* Prevents stretching the graphics */
        }
        #loader {
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding-top: 20%;
        }
    </style>
</head>

<body>
    <div id="content"></div>
    <div id="loader">Loading Game Assets...</div>

    <script type="text/javascript" src="assets/lib/nape.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-cachebuster.min.js"></script>
    <script type="text/javascript" src="assets/lib/phaser-super-storage.min.js"></script>
    <script type="text/javascript" src="assets/lib/dragonBones.min.js"></script>

    <script type="text/javascript">
        // --- AD BLOCKER & AUTO-START LOGIC ---
        var useEvents = (typeof(Event) === 'function');

        var myDispatchEvent = function (name){
            var event;
            if (useEvents){
                event = new Event(name);
            } else {
                event = document.createEvent('Event');
                event.initEvent(name, true, true);
            }
            var contentDiv = document.getElementById("content");
            if(contentDiv) contentDiv.dispatchEvent(event);
        }

        // Mock the GameDistribution options
        window["GD_OPTIONS"] = {
            "gameId": "516d6908fbc848bdb89e65a58a43a7dc",
            "onEvent": function(event) {
                // No logic needed here as we bypass the real SDK
            },
        };

        // Fake the Ad SDK behavior
        window.gdsdk = {
            showAd: function() { return Promise.resolve(); },
            preloadAd: function() { return Promise.resolve(); },
            openConsole: function() { console.log("Console opened"); }
        };

        // Force-start the game logic after the page loads
        window.onload = function() {
            console.log("Bypassing Ad SDK...");
            setTimeout(function() {
                myDispatchEvent('SDK_READY');
                myDispatchEvent('SDK_GAME_START');
                // Hide the loader text once we trigger the start
                var loader = document.getElementById("loader");
                if(loader) loader.style.display = "none";
            }, 1000);
        };
    </script>

    <script type="text/javascript" src="basketball_stars.min.js"></script>
</body>

</html>
